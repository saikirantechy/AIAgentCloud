name: CI — Test Suite

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - 'dashboard.html'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - 'dashboard.html'

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install only the packages needed for the test suite.
          # ML packages (torch, transformers, bitsandbytes) are imported
          # lazily in ml_engine.py and aren't needed for CI — tests
          # gracefully fall back to static responses without them.
          pip install fastapi>=0.104.0 pydantic>=2.5.0 httpx pytest

      - name: Run tests
        run: |
          python -m pytest test_main.py test_ml_engine.py -v --tb=short --junitxml=pytest-results.xml

      - name: Upload test results (if pytest-xdist is available)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.python-version }}
          path: pytest-results.xml
          retention-days: 5
